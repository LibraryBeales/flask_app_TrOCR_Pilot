<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            color: #333;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        header h1 {
            font-size: 18px;
            font-weight: bold;
            margin-right: 10px;
        }

        header input[type="text"] {
            padding: 7px 10px;
            font-size: 14px;
            border: none;
            border-radius: 4px;
            width: 320px;
        }

        button {
            padding: 7px 14px;
            font-size: 13px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-green  { background: #27ae60; color: white; }
        .btn-blue   { background: #2980b9; color: white; }
        .btn-orange { background: #e67e22; color: white; }
        .btn-grey   { background: #7f8c8d; color: white; }

        button:hover { opacity: 0.85; }

        #message {
            padding: 10px 20px;
            font-size: 13px;
            display: none;
        }

        #message.success { background: #d5f5e3; color: #1e8449; }
        #message.error   { background: #fadbd8; color: #922b21; }

        .stats-bar {
            background: #ecf0f1;
            padding: 8px 20px;
            font-size: 12px;
            color: #555;
            border-bottom: 1px solid #ddd;
            display: none;
        }

        .table-wrap {
            overflow-x: auto;
            padding: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 13px;
            table-layout: fixed;
        }

        thead tr {
            background: #2c3e50;
            color: white;
        }

        thead th {
            padding: 10px 8px;
            text-align: left;
            font-weight: bold;
        }

        thead th:nth-child(1) { width: 50px; }
        thead th:nth-child(2) { width: 22%; }
        thead th:nth-child(3) { width: 22%; }
        thead th:nth-child(4) { width: 28%; }
        thead th:nth-child(5) { width: 80px; }

        tbody tr {
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover { background: #fafafa; }
        tbody tr.edited { background: #fef9e7; }

        td {
            padding: 6px 8px;
            vertical-align: top;
            word-break: break-word;
        }

        .line-num {
            text-align: center;
            color: #999;
            font-size: 11px;
            padding-top: 8px;
        }

        .text-cell {
            padding: 5px 6px;
            border-radius: 3px;
            line-height: 1.4;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            min-height: 28px;
        }

        .raw-cell      { background: #f8f9fa; color: #555; font-style: italic; }
        .llm-cell      { background: #eafaf1; color: #1e8449; }
        .empty-cell    { color: #bbb; font-style: italic; }

        .edit-input {
            width: 100%;
            padding: 5px 6px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            border: 1px solid #ccc;
            border-radius: 3px;
            resize: vertical;
            min-height: 32px;
            line-height: 1.4;
        }

        .edit-input:focus {
            outline: none;
            border-color: #2980b9;
            box-shadow: 0 0 3px rgba(41,128,185,0.4);
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
            background: #ecf0f1;
            color: #666;
            display: inline-block;
        }

        .status-badge.edited-badge {
            background: #f39c12;
            color: white;
        }

        .full-text-panel {
            margin: 0 15px 15px;
            background: white;
            border-radius: 6px;
            border: 1px solid #ddd;
            display: none;
        }

        .full-text-panel h3 {
            padding: 10px 15px;
            background: #ecf0f1;
            border-bottom: 1px solid #ddd;
            font-size: 13px;
            color: #555;
        }

        .full-text-tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
        }

        .tab-btn {
            padding: 8px 15px;
            font-size: 12px;
            border: none;
            background: none;
            cursor: pointer;
            color: #666;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            font-weight: normal;
        }

        .tab-btn.active {
            color: #2980b9;
            border-bottom-color: #2980b9;
            font-weight: bold;
        }

        .tab-content {
            padding: 15px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.7;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }

        .tab-content.active { display: block; }
    </style>
</head>
<body>

<header>
    <h1>OCR Editor</h1>

    <div id="singleFileControls" style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
        <input type="text" id="filenameInput"
               placeholder="Enter image filename e.g. page_0001_123456789.jpg">
        <button class="btn-green" onclick="loadFile()">Load</button>
    </div>

    <div id="batchControls"
         style="display:none; gap:6px; align-items:center; flex-wrap:wrap;">
        <button class="btn-grey" onclick="firstPage()">|◀ First</button>
        <button class="btn-grey" onclick="prevPage()">◀ Prev</button>
        <span id="batchPageIndicator"
              style="background:#fff; color:#333; padding:5px 12px;
                     border-radius:4px; font-size:13px; font-weight:bold;
                     white-space:nowrap;">
            Page 1 of 1
        </span>
        <button class="btn-grey" onclick="nextPage()">Next ▶</button>
        <button class="btn-grey" onclick="lastPage()">Last ▶|</button>
        <input type="number" id="jumpToPage" min="1"
               placeholder="Go to page"
               style="width:90px; padding:6px; font-size:13px;
                      border:none; border-radius:4px;"
               onkeydown="if(event.key==='Enter') jumpToPageNum()">
        <button class="btn-grey" onclick="jumpToPageNum()">Go</button>
        <span id="batchOriginalName"
              style="font-size:11px; color:#aaa; max-width:200px;
                     overflow:hidden; text-overflow:ellipsis;
                     white-space:nowrap;"></span>
    </div>

    <button class="btn-green"  onclick="saveEdits()">Save</button>
    <button class="btn-green"  onclick="saveAndNext()"
            id="saveNextBtn" style="display:none;">
        Save &amp; Next ▶
    </button>
    <button class="btn-blue"   onclick="toggleFullText()">Full Text</button>
    <button class="btn-orange" onclick="downloadText()">Download TXT</button>
    <button class="btn-orange" onclick="downloadLines()">Download Lines</button>
    <button class="btn-orange" id="downloadBatchBtn"
            onclick="downloadBatch()" style="display:none;">
        ⬇️ Download All Pages
    </button>
    <button class="btn-grey"   onclick="clearAll()">Clear</button>
    <a href="/" style="color:#ccc; font-size:12px; text-decoration:none;
                       margin-left:8px;">← Back to Main</a>
</header>

<div id="message"></div>
<div id="statsBar" class="stats-bar"></div>

<div class="full-text-panel" id="fullTextPanel">
    <div class="full-text-tabs">
        <button class="tab-btn active" onclick="switchTab('raw')">Raw TrOCR</button>
        <button class="tab-btn" onclick="switchTab('prellm')">Pre-LLM</button>
        <button class="tab-btn" onclick="switchTab('corrected')">LLM Corrected</button>
        <button class="tab-btn" onclick="switchTab('manual')">Manual / Final</button>
    </div>
    <div id="tab-raw"       class="tab-content active"></div>
    <div id="tab-prellm"    class="tab-content"></div>
    <div id="tab-corrected" class="tab-content"></div>
    <div id="tab-manual"    class="tab-content"></div>
</div>

<div class="table-wrap" id="tableWrap" style="display:none">
    <table>
        <thead>
            <tr>
                <th style="width:50px;">#</th>
                <th style="width:180px;">Page Image</th>
                <th>Raw TrOCR Output</th>
                <th>LLM Corrected</th>
                <th>Manual Edit (editable)</th>
                <th style="width:80px;">Status</th>
            </tr>
        </thead>
        <tbody id="lineRows"></tbody>
    </table>
</div>

<script>
    let currentFilename = null
    let linesData = []
    let fullTextData = {}

    // Batch state
    let batchManifestId = null
    let batchFilenames = []
    let batchIndex = 0
    let batchTotal = 0
    let unsavedChanges = false

    // ── Initialise from URL params ─────────────────────────────
    ;(function init() {
        const params = new URLSearchParams(window.location.search)
        const manifestId = params.get('manifest_id')
        const filename   = params.get('filename')

        if (manifestId) {
            loadBatch(manifestId)
        } else if (filename) {
            document.getElementById('filenameInput').value = filename
            loadFile()
        }
    })()

    // ── Load a batch manifest ──────────────────────────────────
    function loadBatch(manifestId) {
        fetch(`/batch_manifest/${manifestId}`)
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showMessage('Batch not found: ' + data.error, 'error')
                    return
                }

                batchManifestId = manifestId
                batchFilenames  = data.filenames || []
                batchTotal      = batchFilenames.length
                batchIndex      = 0

                // Switch UI to batch mode
                document.getElementById('singleFileControls').style.display = 'none'
                document.getElementById('batchControls').style.display = 'flex'
                document.getElementById('saveNextBtn').style.display = 'inline-block'
                document.getElementById('downloadBatchBtn').style.display = 'inline-block'
                document.getElementById('jumpToPage').max = batchTotal

                showMessage(
                    `Batch loaded: ${batchTotal} pages`,
                    'success'
                )
                loadBatchPage(0)
            })
            .catch(e => showMessage('Failed to load batch: ' + e, 'error'))
    }

    // ── Load a specific page in the batch ─────────────────────
    function loadBatchPage(index) {
        if (index < 0 || index >= batchTotal) return
        batchIndex = index
        const filename = batchFilenames[index]
        updateBatchIndicator()

        // Show original filename if available
        fetch(`/get_editable_text/${encodeURIComponent(filename)}`)
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showMessage('Error loading page: ' + data.error, 'error')
                    return
                }

                currentFilename = filename
                linesData = data.lines || []
                fullTextData = {
                    raw:       data.original_text  || '',
                    prellm:    data.pre_llm_text   || '',
                    corrected: data.corrected_text || '',
                    manual:    data.manual_text    || ''
                }

                // Show original filename in header
                const origName = data.lines && data.lines.length > 0
                    ? filename
                    : filename
                document.getElementById('batchOriginalName').textContent =
                    filename

                renderLines(linesData)
                updateFullTextPanels()
                unsavedChanges = false

                document.getElementById('tableWrap').style.display = 'block'
                document.getElementById('statsBar').style.display  = 'block'
                document.getElementById('statsBar').textContent =
                    `Page ${batchIndex + 1} of ${batchTotal}  |  ` +
                    `File: ${filename}  |  ` +
                    `Lines: ${data.total_lines}  |  ` +
                    `LLM corrected: ${data.corrected_text ? 'yes' : 'no'}  |  ` +
                    `Manually edited: ${data.manual_text ? 'yes' : 'no'}`
            })
            .catch(e => showMessage('Failed to load page: ' + e, 'error'))
    }

    function updateBatchIndicator() {
        document.getElementById('batchPageIndicator').textContent =
            `Page ${batchIndex + 1} of ${batchTotal}`
        document.getElementById('jumpToPage').value = batchIndex + 1
    }

    // ── Batch navigation ───────────────────────────────────────
    function firstPage() {
        if (unsavedChanges && !confirmLeave()) return
        loadBatchPage(0)
    }

    function prevPage() {
        if (unsavedChanges && !confirmLeave()) return
        if (batchIndex > 0) loadBatchPage(batchIndex - 1)
    }

    function nextPage() {
        if (unsavedChanges && !confirmLeave()) return
        if (batchIndex < batchTotal - 1) loadBatchPage(batchIndex + 1)
        else showMessage('You are on the last page', 'success')
    }

    function lastPage() {
        if (unsavedChanges && !confirmLeave()) return
        loadBatchPage(batchTotal - 1)
    }

    function jumpToPageNum() {
        const val = parseInt(document.getElementById('jumpToPage').value)
        if (isNaN(val) || val < 1 || val > batchTotal) {
            showMessage(`Enter a page number between 1 and ${batchTotal}`, 'error')
            return
        }
        if (unsavedChanges && !confirmLeave()) return
        loadBatchPage(val - 1)
    }

    function saveAndNext() {
        saveEdits(function() {
            if (batchIndex < batchTotal - 1) {
                loadBatchPage(batchIndex + 1)
            } else {
                showMessage('All pages reviewed — you are on the last page', 'success')
            }
        })
    }

    function confirmLeave() {
        return confirm(
            'You have unsaved changes on this page.\n\n' +
            'Click OK to discard changes and continue, ' +
            'or Cancel to stay and save first.'
        )
    }

    // ── Load single file ───────────────────────────────────────
    function loadFile() {
        const filename = document.getElementById('filenameInput').value.trim()
        if (!filename) { showMessage('Please enter a filename', 'error'); return }

        fetch(`/get_editable_text/${encodeURIComponent(filename)}`)
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showMessage('Error: ' + data.error, 'error')
                    return
                }

                currentFilename = filename
                linesData = data.lines || []
                fullTextData = {
                    raw:       data.original_text  || '',
                    prellm:    data.pre_llm_text   || '',
                    corrected: data.corrected_text || '',
                    manual:    data.manual_text    || ''
                }

                renderLines(linesData)
                updateFullTextPanels()
                unsavedChanges = false

                document.getElementById('tableWrap').style.display = 'block'
                document.getElementById('statsBar').style.display  = 'block'
                document.getElementById('statsBar').textContent =
                    `Loaded: ${filename}  |  Lines: ${data.total_lines}  |  ` +
                    `LLM corrected: ${data.corrected_text ? 'yes' : 'no'}  |  ` +
                    `Manually edited: ${data.manual_text ? 'yes' : 'no'}`

                showMessage(`Loaded ${data.total_lines} lines`, 'success')
            })
            .catch(e => showMessage('Failed to load: ' + e, 'error'))
    }

    // ── Render line table ──────────────────────────────────────
    function renderLines(lines) {
        const tbody = document.getElementById('lineRows')
        tbody.innerHTML = ''
        const cacheBust = '?t=' + Date.now()

        lines.forEach((line, i) => {
            const raw       = line.original  || ''
            const llm       = line.corrected || ''
            const manual    = line.manual    || llm
            const wasEdited = line.manually_edited
            const imgFile   = line.image_filename || ''

            const tr = document.createElement('tr')
            tr.id = `row-${i}`
            if (wasEdited) tr.classList.add('edited')

            tr.innerHTML = `
                <td class="line-num">${line.line_index + 1}</td>
                <td style="width:180px; padding:4px; vertical-align:middle; text-align:center;">
                    ${imgFile
                        ? `<img src="/line_segment/${encodeURIComponent(imgFile)}${cacheBust}"
                                alt="Line ${line.line_index + 1}"
                                style="max-width:170px; max-height:60px;
                                    object-fit:contain; border-radius:3px;
                                    border:1px solid #ddd; background:#fff;"
                                onerror="this.style.display='none';
                                        this.nextElementSibling.style.display='block';">
                        <span style="display:none; font-size:11px; color:#aaa;">No image</span>`
                        : `<span style="font-size:11px; color:#aaa;">No image</span>`
                    }
                </td>
                <td>
                    <div class="text-cell raw-cell ${raw ? '' : 'empty-cell'}">
                        ${escHtml(raw) || '(empty)'}
                    </div>
                </td>
                <td>
                    <div class="text-cell llm-cell ${llm ? '' : 'empty-cell'}">
                        ${escHtml(llm) || '(no LLM output)'}
                    </div>
                </td>
                <td>
                    <textarea class="edit-input"
                            id="edit-${i}"
                            rows="2"
                            oninput="markEdited(${i})"
                            onkeydown="handleKey(event,${i})"
                    >${escHtml(manual)}</textarea>
                </td>
                <td>
                    <span class="status-badge ${wasEdited ? 'edited-badge' : ''}"
                        id="badge-${i}">
                        ${wasEdited ? 'edited' : (line.correction_status || 'none')}
                    </span>
                </td>
            `
            tbody.appendChild(tr)
        })
    }

    // ── Mark row as edited ─────────────────────────────────────
    function markEdited(i) {
        unsavedChanges = true
        document.getElementById(`row-${i}`).classList.add('edited')
        const badge = document.getElementById(`badge-${i}`)
        badge.textContent = 'edited'
        badge.classList.add('edited-badge')
    }

    // ── Tab / Enter navigation ─────────────────────────────────
    function handleKey(e, i) {
        if (e.key === 'Tab' || (e.key === 'Enter' && !e.shiftKey)) {
            e.preventDefault()
            const next = document.getElementById(`edit-${i + 1}`)
            if (next) { next.focus(); next.select() }
        }
    }

    // ── Save edits ─────────────────────────────────────────────
    function saveEdits(callback) {
        if (!currentFilename) {
            showMessage('No file loaded', 'error')
            return
        }

        const editedLines = linesData.map((line, i) => ({
            line_index: line.line_index,
            corrected:  document.getElementById(`edit-${i}`).value
        }))

        fetch('/save_edits', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({
                filename: currentFilename,
                lines:    editedLines
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                fullTextData.manual = data.manual_text || ''
                updateFullTextPanels()
                document.querySelectorAll('tr.edited')
                    .forEach(r => r.classList.remove('edited'))
                unsavedChanges = false
                showMessage('Saved', 'success')
                if (typeof callback === 'function') callback()
            } else {
                showMessage('Save failed: ' + data.error, 'error')
            }
        })
        .catch(e => showMessage('Save failed: ' + e, 'error'))
    }

    // ── Full text panel ────────────────────────────────────────
    function toggleFullText() {
        const panel = document.getElementById('fullTextPanel')
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none'
    }

    function updateFullTextPanels() {
        document.getElementById('tab-raw').textContent =
            fullTextData.raw       || '(none)'
        document.getElementById('tab-prellm').textContent =
            fullTextData.prellm    || '(none)'
        document.getElementById('tab-corrected').textContent =
            fullTextData.corrected || '(none)'
        document.getElementById('tab-manual').textContent =
            fullTextData.manual    || '(none)'
    }

    function switchTab(name) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
            b.classList.toggle(
                'active',
                ['raw','prellm','corrected','manual'][i] === name
            )
        })
        document.querySelectorAll('.tab-content')
            .forEach(c => c.classList.remove('active'))
        document.getElementById('tab-' + name).classList.add('active')
    }

    // ── Downloads ──────────────────────────────────────────────
    function downloadText() {
        if (!currentFilename) {
            showMessage('No file loaded', 'error'); return
        }
        window.location.href =
            `/download_text/${encodeURIComponent(currentFilename)}`
    }

    function downloadLines() {
        if (!currentFilename) {
            showMessage('No file loaded', 'error'); return
        }
        window.location.href =
            `/download_lines/${encodeURIComponent(currentFilename)}`
    }

    function downloadBatch() {
        if (!batchManifestId) {
            showMessage('No batch loaded', 'error'); return
        }
        window.location.href = `/download_batch/${batchManifestId}`
    }

    // ── Clear ──────────────────────────────────────────────────
    function clearAll() {
        currentFilename = null
        linesData = []
        unsavedChanges = false
        document.getElementById('filenameInput').value = ''
        document.getElementById('lineRows').innerHTML = ''
        document.getElementById('tableWrap').style.display = 'none'
        document.getElementById('statsBar').style.display  = 'none'
        document.getElementById('fullTextPanel').style.display = 'none'
    }

    // ── Warn on page close if unsaved ──────────────────────────
    window.addEventListener('beforeunload', e => {
        if (unsavedChanges) {
            e.preventDefault()
            e.returnValue = ''
        }
    })

    // ── Helpers ────────────────────────────────────────────────
    function showMessage(text, type) {
        const el = document.getElementById('message')
        el.textContent = text
        el.className = type
        el.style.display = 'block'
        setTimeout(() => { el.style.display = 'none' }, 4000)
    }

    function escHtml(str) {
        if (!str) return ''
        return str
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    document.getElementById('filenameInput')
        .addEventListener('keydown', e => {
            if (e.key === 'Enter') loadFile()
        })
</script>
</body>
</html>
